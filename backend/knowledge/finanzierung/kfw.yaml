content:
  de: |
    ## KfW-Förderprogramme für Übernahmen

    ### Überblick
    Die KfW (Kreditanstalt für Wiederaufbau) bietet mehrere Förderprogramme, die bei
    Unternehmensübernahmen genutzt werden können. Die Kredite werden **nicht direkt bei der KfW
    beantragt**, sondern über die Hausbank (Durchleitungsprinzip).

    ⚠️ Die Konditionen (Zinssätze, Förderhöchstbeträge) ändern sich regelmäßig. Immer aktuelle
    Konditionen auf **kfw.de** bzw. beim Bankberater prüfen.

    ### Programm 1: ERP-Gründerkredit Universell (Programm-Nr. 073, 074)
    **Zielgruppe:** Gründer und Unternehmen bis 5 Jahre nach Gründung — **gilt auch für Nachfolger!**

    - **Förderbetrag:** bis zu 25 Mio. €
    - **Laufzeit:** 5–20 Jahre
    - **Tilgungsfreie Anlaufjahre:** bis zu 3 Jahre möglich
    - **Zinssatz:** risikogerechtes Zinssystem, abhängig von Besicherung (typisch 2,5–5 %)
    - **Eigenkapitalersatz:** Bis zu 100 % der förderfähigen Kosten finanzierbar
    - **Haftungsfreistellung:** KfW stellt Hausbank für 70 % der Kreditsumme frei (erleichtert Besicherung)

    **Verwendung:** Kaufpreis für Unternehmensübernahme, Betriebsmittel, Investitionen

    ### Programm 2: ERP-Kapital für Gründung (Programm-Nr. 058)
    - Eigenkapitalähnliches Darlehen (nachrangig)
    - **Förderbetrag:** bis zu 500.000 €
    - Besondere Eigenschaft: Nachrangig = zählt oft wie Eigenkapital bei der Hausbank
    - **Laufzeit:** 15 Jahre, tilgungsfrei in den ersten 7 Jahren
    - Geeignet, wenn keine ausreichenden Sicherheiten vorhanden sind

    ### Programm 3: KfW-Unternehmerkredit (Programm-Nr. 037, 047)
    **Zielgruppe:** Bestehende Unternehmen (älter als 5 Jahre) — für Übernahme durch etablierte Unternehmen

    - **Förderbetrag:** bis zu 25 Mio. €
    - Laufzeit: 5–20 Jahre
    - Keine Beschränkung auf Gründer
    - Auch für Unternehmensübernahmen durch bereits bestehende Firmen

    ### Programm 4: ERP-Digitalisierungs- und Innovationskredit (Programm-Nr. 380)
    Relevant wenn der Erwerber die Digitalisierung des übernommenen Unternehmens plant:
    - Bis 7,5 Mio. €
    - Für Digitalisierungs- und Innovationsprojekte im Zusammenhang mit der Übernahme

    ### Kombinationsmöglichkeiten
    KfW-Förderprogramme lassen sich kombinieren:
    - ERP-Kapital (058) als Eigenkapitalbasis
    - ERP-Gründerkredit (073/074) für den Hauptanteil
    - Ggf. Bürgschaft der Bürgschaftsbank des jeweiligen Bundeslandes zur Besicherung

    ### Typische Finanzierungsstruktur (Beispiel: Übernahme für 500.000 €)
    | Posten | Betrag | Quelle |
    |---|---|---|
    | Eigenkapital Käufer | 75.000 € (15 %) | Eigenmittel |
    | ERP-Kapital (058) | 75.000 € (15 %) | Nachrangig, tlw. EK-Ersatz |
    | ERP-Gründerkredit (073) | 350.000 € (70 %) | Über Hausbank |
    | Kaufpreis gesamt | **500.000 €** | |

    ### Voraussetzungen
    - Antragsteller: natürliche Person / GmbH / GbR / OHG oder andere Rechtsformen
    - **Antrag VOR Beginn des Vorhabens** stellen (d. h. vor Signing des Kaufvertrags!)
    - Positives unternehmerisches Konzept / Businessplan
    - Ausreichende Bonität des Antragstellers
    - Österreich, Schweiz, EU-Ausland: verschiedene Programme, hier nur D-inländische

    ### Antragsweg
    1. Businessplan und Finanzierungsbedarf ermitteln
    2. Hausbank kontaktieren (jede DE-Bank kann KfW-Anträge stellen)
    3. Hausbank stellt Antrag bei KfW
    4. KfW prüft und genehmigt
    5. Hausbank leitet Kredit aus

    ⚠️ **Nie direkt bei KfW beantragen** — der Antrag muss über die Hausbank laufen!

    ### Bürgschaftsbanken der Bundesländer
    Bei fehlenden Sicherheiten können Bürgschaftsbanken einspringen:
    - Übernahme von 50–80 % des Kreditrisikos
    - Gebühr ca. 1 % p. a. auf Bürgschaftsbetrag
    - Je Bundesland eine Bürgschaftsbank (z. B. Bürgschaftsbank Bayern, Bürgschaftsbank NRW)

    ### nexxt-change Unternehmensbörse
    Für die Suche nach Übernahmekandidaten steht die staatliche nexxt-change Plattform zur Verfügung.
    Registrierung als Nachfolger kostenlos. → https://www.nexxt-change.org

  en: |
    ## KfW Financing Programs for Business Succession

    ### Overview
    KfW (Germany's state-owned development bank) offers several programs usable for business acquisitions.
    Applications must be submitted through your Hausbank (house bank) — NOT directly to KfW.

    ### ERP Start-up Loan Universal (Programme 073, 074)
    - Up to €25M
    - For founders and companies up to 5 years old — **successors qualify!**
    - Up to 3 grace years
    - 70% liability exemption for the Hausbank

    ### ERP Capital for Founders (Programme 058)
    - Up to €500K
    - Subordinated loan (counts as quasi-equity)
    - 15-year term, 7-year grace period

    ### KfW Entrepreneur Loan (Programme 037, 047)
    - Up to €25M
    - For established companies acquiring other businesses (>5 years old)

    ### Key rules
    - Apply BEFORE signing the purchase agreement
    - All applications go through your Hausbank
    - Can be combined with state guarantee banks (Bürgschaftsbanken)

