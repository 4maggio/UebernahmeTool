summary:
  de: "Das vereinfachte Ertragswertverfahren nach § 199 BewG kapitalisiert den nachhaltig erzielbaren Jahresertrag mit dem Faktor 13,75. Es wird vor allem für steuerliche Unternehmensbewertungen verwendet."
