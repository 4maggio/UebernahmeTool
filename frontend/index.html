<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Professionelles Tool für Unternehmensübernahme-Analyse: Bewertung, Due Diligence, Checklisten.">
    <meta name="robots" content="noindex, nofollow">
    <title>Unternehmensübernahme Analyse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- API base configuration — override for production -->
    <script>
        window.APP_CONFIG = { apiBase: '/api' };
    </script>
</head>

<body>

    <!-- ── Password Gate ────────────────────────────────────── -->
    <div id="pw-gate" style="
        position:fixed;inset:0;z-index:9999;
        background:#f8f8f6;
        display:flex;align-items:center;justify-content:center;
        font-family:'Inter',sans-serif;">
        <div style="
            background:#fff;border-radius:12px;
            padding:2.5rem 2rem;width:100%;max-width:360px;
            box-shadow:0 4px 24px rgba(0,0,0,.08);
            text-align:center;">
            <div style="font-size:2rem;margin-bottom:.5rem">🔐</div>
            <h2 style="margin:0 0 .25rem;font-size:1.1rem;color:#1a1a1a">Unternehmensübernahme</h2>
            <p style="margin:0 0 1.5rem;font-size:.85rem;color:#888">Bitte Zugangspasswort eingeben</p>
            <input id="pw-input" type="password" placeholder="Passwort" autofocus style="
                width:100%;box-sizing:border-box;
                padding:.7rem 1rem;border:1.5px solid #ddd;border-radius:8px;
                font-size:1rem;outline:none;margin-bottom:.75rem;
                transition:border-color .15s;" />
            <div id="pw-error" style="color:#c0392b;font-size:.8rem;min-height:1.2rem;margin-bottom:.5rem"></div>
            <button id="pw-btn" style="
                width:100%;padding:.75rem;background:#2c3e50;color:#fff;
                border:none;border-radius:8px;font-size:1rem;cursor:pointer;
                transition:background .15s;">Weiter</button>
        </div>
    </div>
    <script>
        (function () {
            var SESSION_KEY = 'uebernahme_auth';
            var gate = document.getElementById('pw-gate');
            if (sessionStorage.getItem(SESSION_KEY) === '1') {
                gate.remove();
                return;
            }
            function tryUnlock() {
                var val = document.getElementById('pw-input').value;
                if (val === 'Übergabe300') {
                    sessionStorage.setItem(SESSION_KEY, '1');
                    gate.style.opacity = '0';
                    gate.style.transition = 'opacity .3s';
                    setTimeout(function () { gate.remove(); }, 300);
                } else {
                    document.getElementById('pw-error').textContent = 'Falsches Passwort';
                    document.getElementById('pw-input').style.borderColor = '#c0392b';
                    document.getElementById('pw-input').select();
                }
            }
            document.getElementById('pw-btn').addEventListener('click', tryUnlock);
            document.getElementById('pw-input').addEventListener('keydown', function (e) {
                if (e.key === 'Enter') tryUnlock();
                document.getElementById('pw-error').textContent = '';
                document.getElementById('pw-input').style.borderColor = '#ddd';
            });
        })();
    </script>

    <div class="app-wrapper">

        <!-- ── Header ─────────────────────────────────────────── -->
        <header class="app-header">
            <div class="header-brand">
                <div class="header-logo" aria-hidden="true">Ü</div>
                <div>
                    <div class="header-title" data-i18n="app.title"></div>
                    <div class="header-subtitle" data-i18n="app.subtitle"></div>
                </div>
            </div>
            <div class="header-actions">
                <button id="lang-toggle" aria-label="Toggle language">🇬🇧 EN</button>
            </div>
        </header>

        <!-- ── Progress Bar ───────────────────────────────────── -->
        <div class="progress-bar-wrapper" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="7">
            <div class="progress-bar-fill" id="progress-bar-fill" style="width: 0%"></div>
        </div>
        <div class="progress-label" id="progress-label" aria-live="polite"></div>

        <!-- ── Body: Sidebar + Main ───────────────────────────── -->
        <div class="app-body">

            <!-- Sidebar Navigation -->
            <nav class="app-sidebar" aria-label="Wizard Navigation">
                <ul class="step-nav" id="step-nav" role="tablist"></ul>
                <div id="nav-result" class="nav-result" role="tab" aria-label="Ergebnis">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <polyline points="22,12 18,12 15,21 9,3 6,12 2,12" />
                    </svg>
                    <span data-i18n="nav.result"></span>
                </div>
            </nav>

            <!-- Main Wizard Content -->
            <main class="app-main" id="main-content" role="main">
                <div id="wizard-content">
                    <!-- Filled dynamically by app.js -->
                    <div class="loading-screen">
                        <div class="spinner"></div>
                        <p data-i18n="app.loading"></p>
                    </div>
                </div>
            </main>

        </div><!-- /.app-body -->

        <!-- ── Footer ─────────────────────────────────────────── -->
        <footer class="app-footer">
            <p data-i18n="app.disclaimer"></p>
            <p style="margin-top:.25rem">
                Quellen: <a href="https://www.gesetze-im-internet.de" target="_blank"
                    rel="noopener noreferrer">gesetze-im-internet.de</a> ·
                <a href="https://www.bmf.bund.de" target="_blank" rel="noopener noreferrer">BMF</a> ·
                <a href="https://www.nexxt-change.org" target="_blank" rel="noopener noreferrer">nexxt-change.org</a> ·
                <a href="https://www.kfw.de" target="_blank" rel="noopener noreferrer">KfW</a>
            </p>
        </footer>

    </div><!-- /.app-wrapper -->

    <!-- ── Scripts ──────────────────────────────────────────── -->
    <script src="js/i18n.js"></script>
    <script src="js/api.js"></script>
    <script src="js/valuation.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
