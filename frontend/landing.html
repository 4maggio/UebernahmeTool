<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bäste.eu</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            background: #f8f8f6;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo {
            max-width: min(480px, 88vw);
            max-height: 88vh;
            width: auto;
            height: auto;
            animation: hueshift 12s linear infinite;
        }

        @keyframes hueshift {
            0%   { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
    </style>
</head>
<body>
    <img class="logo" src="assets/baeste-soon.png" alt="bäste — coming soon">
</body>
</html>
