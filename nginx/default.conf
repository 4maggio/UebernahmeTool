# Nginx config for baeste.eu / xn--bste-loa.eu (bäste.eu)
# Mounted into the nginx container by /srv/traefik/docker-compose.yml
# TLS/HTTPS is handled by Traefik — this server only speaks HTTP internally.
# Routing:
#   /              → landing page (landing.html)
#   /uebernahme    → SPA tool (index.html)
#   /uebernahme/admin → admin panel (admin.html)
#   /api/          → Node.js backend on host:3000

server {
    listen 80;
    server_name baeste.eu xn--bste-loa.eu;

    root /usr/share/nginx/html;

    # ── Static assets — long cache ────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /locales/ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── API proxy — backend on host port 3000 ─────────────────────
    location /api/ {
        proxy_pass         http://host.docker.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 2M;
    }

    # ── Admin panel ───────────────────────────────────────────────
    location = /uebernahme/admin {
        try_files /admin.html =404;
    }

    # ── Tool SPA at /uebernahme ───────────────────────────────────
    location /uebernahme {
        try_files $uri $uri/ /index.html;
    }

    # ── Landing page at / ─────────────────────────────────────────
    location / {
        try_files $uri /landing.html;
    }
}

