# Nginx config for baeste.eu / xn--bste-loa.eu (bäste.eu)
# Mounted into the nginx container by /srv/traefik/docker-compose.yml
# TLS/HTTPS is handled by Traefik — this server only speaks HTTP internally.
# Routing:
#   /              → landing page (landing.html)
#   /uebernahme    → SPA tool (index.html)
#   /uebernahme/admin → admin panel (admin.html)
#   /api/          → Node.js backend on host:3000

server {
    listen 80;
    server_name baeste.eu xn--bste-loa.eu;

    root /usr/share/nginx/html;

    # ── Static assets — long cache ────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /locales/ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── API proxy — backend on host port 3000 ─────────────────────
    location /api/ {
        proxy_pass         http://host.docker.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 2M;
    }

    # ── Admin panel ───────────────────────────────────────────────
    location = /uebernahme/admin {
        try_files /admin.html =404;
    }

    # ── Tool SPA at /uebernahme ───────────────────────────────────
    location /uebernahme {
        try_files $uri $uri/ /index.html;
    }

    # ── Landing page at / ─────────────────────────────────────────
    location / {
        try_files $uri /landing.html;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;

    # ── SSL ──────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/example.com/chain.pem;

    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security Headers ─────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "SAMEORIGIN" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml font/truetype font/opentype
        application/vnd.ms-fontobject image/svg+xml;

    # ── Static Frontend ───────────────────────────────────────────
    root /var/www/uebernahme/frontend;
    index index.html;

    # Cache static assets aggressively
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Locale JSON — cache shorter (content may update)
    location /locales/ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Admin panel
    location /admin {
        try_files $uri /admin.html;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Reverse Proxy ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Prevent request smuggling
        proxy_request_buffering on;
        client_max_body_size 2M;
    }

    # Stricter rate limiting for auth endpoints
    location /api/admin/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block access to .env and dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
